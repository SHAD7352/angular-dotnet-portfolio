<div class="blogs-container">
  <div class="projects-header">
    <h2>Manage Blog Posts</h2>
    <button class="btn-primary" (click)="openModal()">
      <span class="material-icons-outlined">add</span>
      New Post
    </button>
  </div>

  <div class="projects-grid">
    <div class="project-card glass-card" *ngFor="let post of portfolioData.blogPosts()">
      <div class="project-image">
        <img [src]="post.coverImage" [alt]="post.title" onerror="this.src='assets/placeholder-image.png'">
        <span class="category-badge">{{ post.published ? 'Published' : 'Draft' }}</span>
      </div>
      <div class="project-content">
        <h3 class="project-title">{{ post.title }}</h3>
        <p class="project-desc">{{ post.excerpt }}</p>
        <div class="tech-stack">
          <span class="tech-chip" *ngFor="let tag of post.tags">{{ tag }}</span>
        </div>
      </div>
      <div class="project-actions">
        <button class="btn-icon edit-btn" (click)="openModal(post)">
          <span class="material-icons-outlined">edit</span>
        </button>
        <button class="btn-icon delete-btn" (click)="deletePost(post.id)">
          <span class="material-icons-outlined">delete</span>
        </button>
      </div>
    </div>

    <div class="empty-state" *ngIf="portfolioData.blogPosts().length === 0">
      <span class="material-icons-outlined">article</span>
      <p>No blog posts found. Create one!</p>
    </div>
  </div>

  <!-- Modal -->
  <div class="modal-backdrop" *ngIf="isModalOpen()">
    <div class="modal-container glass-card modal-lg">
      <div class="modal-header">
        <h3>{{ editingPostId() ? 'Edit Blog Post' : 'New Blog Post' }}</h3>
        <button class="btn-icon" (click)="closeModal()">
          <span class="material-icons-outlined">close</span>
        </button>
      </div>
      
      <div class="modal-body">
        <div class="error-alert" *ngIf="saveError()">
          <span class="material-icons-outlined">error</span>
          {{ saveError() }}
        </div>

        <form [formGroup]="blogForm" (ngSubmit)="savePost()" class="project-form">
          <div class="form-row">
            <div class="form-group">
              <label>Title</label>
              <input type="text" formControlName="title" class="form-control" placeholder="Post Title">
            </div>
            <div class="form-group">
              <label>Slug</label>
              <input type="text" formControlName="slug" class="form-control" placeholder="post-title-slug">
            </div>
          </div>

          <div class="form-group">
            <label>Excerpt</label>
            <textarea formControlName="excerpt" class="form-control" rows="2" placeholder="Brief summary..."></textarea>
          </div>

          <div class="form-group">
            <label>Content (Markdown)</label>
            <textarea formControlName="content" class="form-control" rows="8" placeholder="Write your post content here..."></textarea>
          </div>

          <div class="form-row">
            <div class="form-group">
              <label>Cover Image URL</label>
              <input type="text" formControlName="coverImage" class="form-control" placeholder="https://...">
            </div>
            <div class="form-group">
              <label>Author</label>
              <input type="text" formControlName="author" class="form-control" placeholder="Author Name">
            </div>
          </div>

          <div class="form-row">
            <div class="form-group">
              <label>Publish Date</label>
              <input type="date" formControlName="publishedAt" class="form-control">
            </div>
            <div class="form-group">
              <label>Reading Time (mins)</label>
              <input type="number" formControlName="readingTime" class="form-control" placeholder="e.g. 5">
            </div>
          </div>

          <div class="form-group checkbox-group" style="margin-top: 1rem;">
            <label class="checkbox-container">
              <input type="checkbox" formControlName="published">
              <span class="checkmark"></span>
              Published
            </label>
          </div>

          <div class="form-group tech-stack-group" style="margin-top: 1.5rem;">
            <div class="tech-header">
              <label>Tags</label>
              <button type="button" class="btn-text" (click)="addTag()">
                <span class="material-icons-outlined">add</span> Add Tag
              </button>
            </div>
            <div formArrayName="tags" class="tech-list">
              <div class="tech-item" *ngFor="let tagCtrl of tags.controls; let i=index">
                <input type="text" [formControlName]="i" class="form-control" placeholder="e.g. Angular">
                <button type="button" class="btn-icon delete-btn" (click)="removeTag(i)" [disabled]="tags.length === 1">
                  <span class="material-icons-outlined">close</span>
                </button>
              </div>
            </div>
          </div>

          <div class="modal-footer">
            <button type="button" class="btn-secondary" (click)="closeModal()">Cancel</button>
            <button type="submit" class="btn-primary" [disabled]="blogForm.invalid || isSaving()">
              {{ isSaving() ? 'Saving...' : (editingPostId() ? 'Save Changes' : 'Create Post') }}
            </button>
          </div>
        </form>
      </div>
    </div>
  </div>
</div>
