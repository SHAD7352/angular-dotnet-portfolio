<div class="admin-layout" [class.sidebar-collapsed]="isSidebarCollapsed()">
    <!-- Background WebGL Shader -->
    <div class="shader-container">
        <canvas #shaderCanvas class="shader-canvas"></canvas>
    </div>

    <!-- Sidebar -->
    <aside class="admin-sidebar">
        <div class="sidebar-header">
            <div class="sidebar-brand">
                <span class="brand-icon">
                    <span class="material-icons-outlined">terminal</span>
                </span>
                <div>
                    <h1 class="brand-title">DevStudio Pro</h1>
                    <span class="brand-subtitle">System Admin</span>
                </div>
            </div>

            <button class="collapse-btn" (click)="toggleSidebar()">
                <span class="material-icons-outlined">
                    {{ isSidebarCollapsed() ? 'chevron_right' : 'chevron_left' }}
                </span>
            </button>
        </div>

        <nav class="sidebar-nav">
            @for (item of menuItems(); track item.route) {
            <a [routerLink]="item.route" routerLinkActive="active"
                [routerLinkActiveOptions]="{ exact: item.route === '/admin' }" class="nav-item">
                <span class="nav-icon">
                    <span class="material-icons-outlined">{{ item.icon }}</span>
                </span>
                <span class="nav-label">{{ item.label }}</span>
                @if (item.badge) {
                <span class="nav-badge">{{ item.badge }}</span>
                }
            </a>
            }
        </nav>

        <div class="sidebar-footer">
            <a routerLink="/" class="back-link">
                <span class="material-icons-outlined">arrow_back</span>
                <span>Back to Site</span>
            </a>
            <button class="logout-btn" (click)="authService.logout()">
                <span class="material-icons-outlined">logout</span>
                <span>Logout</span>
            </button>
        </div>
    </aside>

    <!-- Main Content -->
    <main class="admin-main">
        <!-- Admin Header -->
        <header class="admin-header">
            <div class="header-left">
                <button class="mobile-menu-btn" (click)="toggleSidebar()">
                    <span class="material-icons-outlined">menu</span>
                </button>
                <h1>Dashboard</h1>
            </div>
            <div class="header-right">
                <button class="theme-toggle" (click)="themeService.toggleTheme()">
                    <span class="material-icons-outlined">
                        {{ themeService.isDark() ? 'light_mode' : 'dark_mode' }}
                    </span>
                </button>
                <div class="notifications">
                    <button class="notification-btn">
                        <span class="material-icons-outlined">notifications</span>
                        @if (unreadMessagesCount() > 0) {
                            <span class="notification-badge">{{ unreadMessagesCount() }}</span>
                        }
                    </button>
                </div>
                <div class="admin-user">
                    <div class="user-avatar" *ngIf="portfolioData.personalInfo().avatar; else defaultAvatar">
                        <img [src]="portfolioData.personalInfo().avatar" [alt]="portfolioData.personalInfo().name">
                    </div>
                    <ng-template #defaultAvatar>
                        <div class="user-avatar default">
                            <span class="material-icons-outlined">person</span>
                        </div>
                    </ng-template>
                    <span class="user-name">{{ portfolioData.personalInfo().name || 'Administrator' }}</span>
                </div>
            </div>
        </header>

        <!-- Dynamic Content -->
        <div class="admin-content">
            <router-outlet></router-outlet>
        </div>
    </main>
</div>
